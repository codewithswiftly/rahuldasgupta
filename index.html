<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
    background: #f5f7fa;
    color: #2c3e50;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    max-width: 1600px;
    margin: 0 auto;
    gap: 32px;
    padding: 32px;
    min-height: 100vh;
  }

  @media (max-width: 1024px) {
    .container {
      grid-template-columns: 1fr;
      gap: 24px;
    }
  }

  /* ---- Header ---- */
  .header {
    grid-column: 1 / -1;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 32px;
    margin-bottom: 8px;
    color: #1a202c;
  }

  .header p {
    color: #718096;
    font-size: 16px;
  }

  /* ---- Form Section ---- */
  .form-section {
    background: white;
    padding: 32px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }

  .form-section h2 {
    font-size: 20px;
    margin-top: 24px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid #e2e8f0;
    color: #2d3748;
  }

  .form-section h2:first-child {
    margin-top: 0;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-row.full {
    grid-template-columns: 1fr;
  }

  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #4a5568;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus,
  input[type="date"]:focus,
  textarea:focus {
    outline: none;
    border-color: #3182ce;
    box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-add {
    background: #3182ce;
    color: white;
    margin-top: 8px;
  }

  .btn-add:hover {
    background: #2c5aa0;
  }

  .btn-remove {
    background: #fc8181;
    color: white;
    padding: 8px 12px;
    font-size: 13px;
    margin-top: 12px;
  }

  .btn-remove:hover {
    background: #f56565;
  }

  .btn-download {
    grid-column: 1 / -1;
    background: #48bb78;
    color: white;
    padding: 12px 24px;
    font-size: 15px;
    margin-top: 32px;
  }

  .btn-download:hover {
    background: #38a169;
  }

  .entry-item {
    background: #f7fafc;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    border-left: 3px solid #3182ce;
  }

  /* ---- Preview Section ---- */
  .preview-section {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }

  .preview-header {
    text-align: center;
    margin-bottom: 28px;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 20px;
  }

  .preview-name {
    font-size: 32px;
    font-weight: 800;
    color: #1a202c;
    margin-bottom: 8px;
  }

  .preview-contact {
    font-size: 13px;
    color: #718096;
    line-height: 1.6;
  }

  .preview-contact span {
    margin-right: 16px;
  }

  .preview-section-title {
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #2d3748;
    margin-top: 20px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #cbd5e0;
  }

  .preview-entry {
    margin-bottom: 14px;
  }

  .preview-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .preview-entry-title {
    font-weight: 700;
    color: #2d3748;
    font-size: 14px;
  }

  .preview-entry-subtitle {
    font-style: italic;
    color: #4a5568;
    font-size: 13px;
  }

  .preview-entry-date {
    font-size: 12px;
    color: #a0aec0;
  }

  .preview-entry-description {
    font-size: 13px;
    color: #4a5568;
    margin-top: 6px;
    line-height: 1.5;
  }

  .preview-skills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .skill-tag {
    background: #edf2f7;
    color: #2d3748;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .empty-state {
    color: #a0aec0;
    font-style: italic;
    font-size: 13px;
    padding: 12px 0;
  }

  /* Scrollbar styling */
  .form-section::-webkit-scrollbar,
  .preview-section::-webkit-scrollbar {
    width: 6px;
  }

  .form-section::-webkit-scrollbar-track,
  .preview-section::-webkit-scrollbar-track {
    background: #f7fafc;
  }

  .form-section::-webkit-scrollbar-thumb,
  .preview-section::-webkit-scrollbar-thumb {
    background: #cbd5e0;
    border-radius: 3px;
  }

  .form-section::-webkit-scrollbar-thumb:hover,
  .preview-section::-webkit-scrollbar-thumb:hover {
    background: #a0aec0;
  }

  /* Print styles */
  @media print {
    .form-section, .container > * {
      display: none !important;
    }
    .preview-section {
      box-shadow: none;
      padding: 0;
      max-height: none;
      overflow: visible;
    }
    body {
      background: white;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Resume Builder</h1>
    <p>Create and download your professional resume</p>
  </div>

  <!-- FORM SECTION -->
  <div class="form-section" id="formSection">
    <!-- Personal Info -->
    <h2>Personal Information</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="John">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Doe">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="City, State">
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label for="summary">Professional Summary</label>
        <textarea id="summary" placeholder="Brief overview of your professional background and goals..."></textarea>
      </div>
    </div>

    <!-- Experience -->
    <h2>Work Experience</h2>
    <div id="experienceList"></div>
    <button class="btn-add" onclick="addExperience()">+ Add Experience</button>

    <!-- Education -->
    <h2>Education</h2>
    <div id="educationList"></div>
    <button class="btn-add" onclick="addEducation()">+ Add Education</button>

    <!-- Skills -->
    <h2>Skills</h2>
    <div class="form-group">
      <label for="skills">Skills (comma-separated)</label>
      <textarea id="skills" placeholder="e.g., Project Management, Python, Public Speaking, Leadership"></textarea>
    </div>

    <!-- Download -->
    <div class="form-row">
      <button class="btn-download" onclick="downloadResume()">⬇ Download PDF</button>
    </div>
  </div>

  <!-- PREVIEW SECTION -->
  <div class="preview-section" id="previewSection">
    <div class="preview-header">
      <div class="preview-name" id="previewName">Your Name</div>
      <div class="preview-contact">
        <span id="previewEmail">email@example.com</span>
        <span id="previewPhone">(555) 123-4567</span>
        <span id="previewAddress">City, State</span>
      </div>
    </div>

    <div id="summaryPreview" style="display:none;">
      <div class="preview-section-title">Professional Summary</div>
      <div id="previewSummary" class="preview-entry-description"></div>
    </div>

    <div id="experiencePreview" style="display:none;">
      <div class="preview-section-title">Work Experience</div>
      <div id="previewExperienceList"></div>
    </div>

    <div id="educationPreview" style="display:none;">
      <div class="preview-section-title">Education</div>
      <div id="previewEducationList"></div>
    </div>

    <div id="skillsPreview" style="display:none;">
      <div class="preview-section-title">Skills</div>
      <div id="previewSkillsList" class="preview-skills"></div>
    </div>
  </div>
</div>

<script>
  // Template generators
  function createExperienceTemplate(index) {
    return `
      <div class="entry-item" data-exp="${index}">
        <div class="form-row">
          <div class="form-group">
            <label>Job Title</label>
            <input type="text" class="exp-title" placeholder="Software Engineer" onchange="updatePreview()">
          </div>
          <div class="form-group">
            <label>Company</label>
            <input type="text" class="exp-company" placeholder="Tech Corp" onchange="updatePreview()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" class="exp-start" onchange="updatePreview()">
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" class="exp-end" onchange="updatePreview()">
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label>Description</label>
            <textarea class="exp-desc" placeholder="Describe your responsibilities and achievements..." onchange="updatePreview()"></textarea>
          </div>
        </div>
        <button class="btn-remove" onclick="removeExperience(${index})">Remove</button>
      </div>
    `;
  }

  function createEducationTemplate(index) {
    return `
      <div class="entry-item" data-edu="${index}">
        <div class="form-row">
          <div class="form-group">
            <label>School/University</label>
            <input type="text" class="edu-school" placeholder="University Name" onchange="updatePreview()">
          </div>
          <div class="form-group">
            <label>Degree</label>
            <input type="text" class="edu-degree" placeholder="Bachelor of Science" onchange="updatePreview()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Field of Study</label>
            <input type="text" class="edu-field" placeholder="Computer Science" onchange="updatePreview()">
          </div>
          <div class="form-group">
            <label>Graduation Year</label>
            <input type="text" class="edu-year" placeholder="2023" onchange="updatePreview()">
          </div>
        </div>
        <button class="btn-remove" onclick="removeEducation(${index})">Remove</button>
      </div>
    `;
  }

  let expCount = 0;
  let eduCount = 0;

  function addExperience() {
    const html = createExperienceTemplate(expCount);
    document.getElementById('experienceList').insertAdjacentHTML('beforeend', html);
    expCount++;
  }

  function addEducation() {
    const html = createEducationTemplate(eduCount);
    document.getElementById('educationList').insertAdjacentHTML('beforeend', html);
    eduCount++;
  }

  function removeExperience(idx) {
    const el = document.querySelector(`[data-exp="${idx}"]`);
    if (el) el.remove();
    updatePreview();
  }

  function removeEducation(idx) {
    const el = document.querySelector(`[data-edu="${idx}"]`);
    if (el) el.remove();
    updatePreview();
  }

  function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
  }

  function updatePreview() {
    // Personal Info
    const firstName = document.getElementById('firstName').value || 'Your';
    const lastName = document.getElementById('lastName').value || 'Name';
    document.getElementById('previewName').textContent = `${firstName} ${lastName}`;

    const email = document.getElementById('email').value || 'email@example.com';
    const phone = document.getElementById('phone').value || '(555) 123-4567';
    const address = document.getElementById('address').value || 'City, State';
    document.getElementById('previewEmail').textContent = email;
    document.getElementById('previewPhone').textContent = phone;
    document.getElementById('previewAddress').textContent = address;

    // Summary
    const summary = document.getElementById('summary').value;
    if (summary) {
      document.getElementById('summaryPreview').style.display = 'block';
      document.getElementById('previewSummary').textContent = summary;
    } else {
      document.getElementById('summaryPreview').style.display = 'none';
    }

    // Experience
    const expItems = document.querySelectorAll('[data-exp]');
    if (expItems.length > 0) {
      document.getElementById('experiencePreview').style.display = 'block';
      let html = '';
      expItems.forEach(item => {
        const title = item.querySelector('.exp-title').value || 'Job Title';
        const company = item.querySelector('.exp-company').value || 'Company';
        const start = item.querySelector('.exp-start').value;
        const end = item.querySelector('.exp-end').value;
        const desc = item.querySelector('.exp-desc').value;
        
        const dateRange = start || end ? `${formatDate(start)} - ${end ? formatDate(end) : 'Present'}` : '';
        
        html += `
          <div class="preview-entry">
            <div class="preview-entry-header">
              <div>
                <div class="preview-entry-title">${title}</div>
                <div class="preview-entry-subtitle">${company}</div>
              </div>
              <div class="preview-entry-date">${dateRange}</div>
            </div>
            ${desc ? `<div class="preview-entry-description">${desc}</div>` : ''}
          </div>
        `;
      });
      document.getElementById('previewExperienceList').innerHTML = html;
    } else {
      document.getElementById('experiencePreview').style.display = 'none';
    }

    // Education
    const eduItems = document.querySelectorAll('[data-edu]');
    if (eduItems.length > 0) {
      document.getElementById('educationPreview').style.display = 'block';
      let html = '';
      eduItems.forEach(item => {
        const school = item.querySelector('.edu-school').value || 'School';
        const degree = item.querySelector('.edu-degree').value || 'Degree';
        const field = item.querySelector('.edu-field').value;
        const year = item.querySelector('.edu-year').value;
        
        html += `
          <div class="preview-entry">
            <div class="preview-entry-header">
              <div>
                <div class="preview-entry-title">${school}</div>
                <div class="preview-entry-subtitle">${degree}${field ? ' in ' + field : ''}</div>
              </div>
              <div class="preview-entry-date">${year || ''}</div>
            </div>
          </div>
        `;
      });
      document.getElementById('previewEducationList').innerHTML = html;
    } else {
      document.getElementById('educationPreview').style.display = 'none';
    }

    // Skills
    const skillsText = document.getElementById('skills').value;
    if (skillsText) {
      document.getElementById('skillsPreview').style.display = 'block';
      const skills = skillsText.split(',').map(s => s.trim()).filter(s => s);
      const html = skills.map(skill => `<div class="skill-tag">${skill}</div>`).join('');
      document.getElementById('previewSkillsList').innerHTML = html;
    } else {
      document.getElementById('skillsPreview').style.display = 'none';
    }
  }

  function downloadResume() {
    const element = document.getElementById('previewSection');
    const name = (document.getElementById('firstName').value || 'resume') + '.pdf';
    
    const printWindow = window.open('', '', 'width=800,height=600');
    printWindow.document.write(`
      <!DOCTYPE html>
      <html>
        <head>
          <title>${name}</title>
          <style>
            body { font-family: Arial, sans-serif; max-width: 800px; margin: 0; padding: 20px; }
            .preview-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
            .preview-name { font-size: 24px; font-weight: bold; }
            .preview-contact { font-size: 12px; color: #666; }
            .preview-section-title { font-size: 12px; font-weight: bold; text-transform: uppercase; margin-top: 15px; margin-bottom: 8px; border-bottom: 1px solid #ddd; }
            .preview-entry { margin-bottom: 10px; }
            .preview-entry-header { display: flex; justify-content: space-between; }
            .preview-entry-title { font-weight: bold; font-size: 13px; }
            .preview-entry-subtitle { font-style: italic; font-size: 12px; color: #333; }
            .preview-entry-date { font-size: 11px; color: #999; }
            .preview-entry-description { font-size: 12px; color: #444; margin-top: 4px; }
            .skill-tag { background: #f0f0f0; padding: 3px 8px; margin: 2px; display: inline-block; font-size: 11px; border-radius: 3px; }
          </style>
        </head>
        <body>
          ${element.innerHTML}
        </body>
      </html>
    `);
    printWindow.document.close();
    printWindow.print();
  }

  // Initialize preview
  updatePreview();

  // Add listeners to personal info
  document.getElementById('firstName').addEventListener('change', updatePreview);
  document.getElementById('lastName').addEventListener('change', updatePreview);
  document.getElementById('email').addEventListener('change', updatePreview);
  document.getElementById('phone').addEventListener('change', updatePreview);
  document.getElementById('address').addEventListener('change', updatePreview);
  document.getElementById('summary').addEventListener('change', updatePreview);
  document.getElementById('skills').addEventListener('change', updatePreview);
</script>

</body>
</html>
